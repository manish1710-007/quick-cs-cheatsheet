    <div class="iframe-container">
        <div id="placeholderText" class="placeholder">
            ✦ SELECT A MODULE TO LOAD ✦<br>
            <span style="font-size:0.5em; font-family:'Kosugi Maru'">モジュールを選択してください</span>
        </div>
        <iframe id="contentFrame" src="about:blank"></iframe>
    </div>

    <script>
        // TYPEWRITER EFFECT FOR SUBTITLE 
        document.addEventListener("DOMContentLoaded", () => {
            const subtitleEl = document.getElementById('typewriter-text');
            const text = subtitleEl.innerText;
            subtitleEl.innerText = ''; // Clear text on load
            
            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    subtitleEl.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 50); 
                }
            }
            
            
            setTimeout(typeWriter, 500); 
        });

        // ENHANCED LOAD FUNCTION 
        function loadPage(url) {
            const placeholder = document.getElementById('placeholderText');
            const iframe = document.getElementById('contentFrame');
            
            
            iframe.style.opacity = '0'; 
            placeholder.style.display = 'block';
            placeholder.innerHTML = 'DOWNLOADING MODULE... <br><span style="font-size:0.5em;">お待ちください (Please wait)</span>';
            placeholder.style.color = "var(--term-green)";

            
            setTimeout(() => {
                iframe.src = url;
                
                
                iframe.onload = () => {
                    placeholder.style.display = 'none';
                    iframe.style.transition = "opacity 0.5s ease";
                    iframe.style.opacity = '1';
                };
            }, 400);
        }
    </script>
