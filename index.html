    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const subtitleEl = document.getElementById('typewriter-text');
            const text = "SYSTEM READY // v2.0";
            subtitleEl.innerText = ''; 
            
            let i = 0;
            function typeWriter() {
                if (i < text.length) {
                    subtitleEl.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(typeWriter, 80); 
                }
            }
            setTimeout(typeWriter, 500); 
            loadSavedWallpaper();
        });

        function loadPage(url) {
            const placeholder = document.getElementById('placeholderText');
            const loader = document.getElementById('loader');
            const iframe = document.getElementById('contentFrame');
            
            placeholder.style.display = 'none';
            loader.style.display = 'flex';
            iframe.style.opacity = '0';
            
            setTimeout(() => {
                iframe.src = url;
                iframe.onload = () => {
                    loader.style.display = 'none';
                    iframe.style.transition = "opacity 0.5s ease";
                    iframe.style.opacity = '1';
                };
            }, 300);
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function setWallpaper(type, url) {
            const placeholder = document.getElementById('placeholderText');
            placeholder.style.backgroundImage = `url('${url}')`;
            
            document.querySelectorAll('.wp-option').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            localStorage.setItem('selected_wallpaper', url);
        }

        function loadSavedWallpaper() {
            const savedUrl = localStorage.getItem('selected_wallpaper');
            if(savedUrl) {
                const placeholder = document.getElementById('placeholderText');
                placeholder.style.backgroundImage = `url('${savedUrl}')`;
                
                document.querySelectorAll('.wp-option').forEach(el => {
                    if(el.style.backgroundImage.includes(savedUrl.substring(0, 20))) { 
                        el.classList.add('active');
                    } else {
                        el.classList.remove('active');
                    }
                });
            }
        }
    </script>
